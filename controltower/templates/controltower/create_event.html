<!DOCTYPE html>
<html>
<head>
  <title>Create Event</title>
  <style>
    body { font-family: Arial; padding: 30px; background: #f4f6f9; }
    .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); max-width: 700px; }
    input, textarea { width: 100%; padding: 10px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; }
    button { margin-top: 12px; padding: 10px 14px; border: none; border-radius: 8px; background: #1f6feb; color: white; font-weight: 600; cursor: pointer; }
    button:hover { opacity: 0.9; }
    a { color: #1f6feb; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<p><a href="/control-tower/">&larr; Back to Dashboard</a></p>

<div class="card">
  <h2>Create New Event</h2>

  <form method="post">
    {% csrf_token %}

    <label><b>Title</b></label>
    <input type="text" name="title" placeholder="Refund request / Weekly update / Support issue" />

    <label style="display:block;margin-top:12px;"><b>Event Text</b></label>
    <textarea name="event_text" rows="6" placeholder="Describe the event in 1-3 sentences..." required></textarea>

    <button type="submit">Create Event</button>
  </form>
</div>

</body>
</html>
